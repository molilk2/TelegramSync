name: Build Binaries

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

concurrency:
  group: build-binaries-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.11"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-windows:
    name: Build Windows binaries
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Verify inputs
        shell: pwsh
        run: |
          if (!(Test-Path "server_main.py")) { throw "server_main.py not found in repository root" }
          if (!(Test-Path "cli_main.py")) { throw "cli_main.py not found in repository root" }
          if (!(Test-Path "build/tg-server.spec")) { throw "build/tg-server.spec not found" }
          if (!(Test-Path "build/tg-cli.spec")) { throw "build/tg-cli.spec not found" }

      - name: Build executables
        shell: pwsh
        run: |
          pyinstaller --noconfirm build/tg-server.spec
          pyinstaller --noconfirm build/tg-cli.spec

          if (!(Test-Path "dist/tg-server.exe")) { throw "dist/tg-server.exe not found after build" }
          if (!(Test-Path "dist/tg-cli.exe")) { throw "dist/tg-cli.exe not found after build" }

      - name: Collect artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path out/windows | Out-Null
          Copy-Item dist/tg-server.exe out/windows/
          Copy-Item dist/tg-cli.exe out/windows/
          Copy-Item README.md out/windows/
          if (Test-Path "docs.md") { Copy-Item docs.md out/windows/ }
          Compress-Archive -Path out/windows/* -DestinationPath out/tg-windows-x64.zip -Force

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-binaries
          path: |
            out/windows/*
            out/tg-windows-x64.zip
          if-no-files-found: error
          compression-level: 0

  build-linux:
    name: Build Linux binaries
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Verify inputs
        run: |
          test -f server_main.py || (echo "server_main.py not found in repository root" && exit 1)
          test -f cli_main.py || (echo "cli_main.py not found in repository root" && exit 1)
          test -f build/tg-server.spec || (echo "build/tg-server.spec not found" && exit 1)
          test -f build/tg-cli.spec || (echo "build/tg-cli.spec not found" && exit 1)

      - name: Build executables
        run: |
          pyinstaller --noconfirm build/tg-server.spec
          pyinstaller --noconfirm build/tg-cli.spec

          test -f dist/tg-server || (echo "dist/tg-server not found after build" && exit 1)
          test -f dist/tg-cli || (echo "dist/tg-cli not found after build" && exit 1)

      - name: Collect artifacts
        run: |
          mkdir -p out/linux
          cp dist/tg-server out/linux/
          cp dist/tg-cli out/linux/
          cp README.md out/linux/
          if [ -f docs.md ]; then cp docs.md out/linux/; fi
          chmod +x out/linux/tg-server
          chmod +x out/linux/tg-cli
          tar -C out/linux -czf out/tg-linux-x86_64.tar.gz .

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-binaries
          path: |
            out/linux/*
            out/tg-linux-x86_64.tar.gz
          if-no-files-found: error
          compression-level: 0

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-windows
      - build-linux
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: List collected files
        run: |
          find release-artifacts -type f | sort

      - name: Create release if missing
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists."
          else
            gh release create "$TAG" --title "$TAG" --generate-notes
          fi

      - name: Upload release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          find release-artifacts -type f -print0 | while IFS= read -r -d '' file; do
            echo "Uploading $file"
            gh release upload "$TAG" "$file" --clobber
          done
