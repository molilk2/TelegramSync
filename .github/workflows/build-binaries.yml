
name: Build binaries

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    name: Linux executable
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller
      - name: Build tg-server and tg-cli
        run: |
          pyinstaller --noconfirm build/tg-server.spec
          pyinstaller --noconfirm build/tg-cli.spec
          mkdir -p out/linux
          cp dist/tg-server out/linux/
          cp dist/tg-cli out/linux/
          cp README.md docs.md out/linux/
          tar -C out -czf tg-linux-x64.tar.gz linux
      - uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: tg-linux-x64.tar.gz

  build-windows:
    name: Windows executable
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller
      - name: Build tg-server.exe and tg-cli.exe
        shell: pwsh
        run: |
          pyinstaller --noconfirm build/tg-server.spec
          pyinstaller --noconfirm build/tg-cli.spec
          New-Item -ItemType Directory -Force -Path out/windows | Out-Null
          Copy-Item dist/tg-server.exe out/windows/
          Copy-Item dist/tg-cli.exe out/windows/
          Copy-Item README.md, docs.md out/windows/
          Compress-Archive -Path out/windows/* -DestinationPath tg-windows-x64.zip -Force
      - uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: tg-windows-x64.zip

  build-termux:
    name: Termux aarch64 runtime bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare Termux bundle
        run: |
          mkdir -p out/termux
          cp -r app out/termux/app
          cp main.py cli_main.py server_main.py requirements.txt README.md docs.md out/termux/
          cat > out/termux/tg-server <<'EOF'
          #!/data/data/com.termux/files/usr/bin/sh
          exec python server_main.py "$@"
          EOF
          cat > out/termux/tg-cli <<'EOF'
          #!/data/data/com.termux/files/usr/bin/sh
          exec python cli_main.py "$@"
          EOF
          chmod +x out/termux/tg-server out/termux/tg-cli
          tar -C out -czf tg-termux-aarch64.tar.gz termux
      - uses: actions/upload-artifact@v4
        with:
          name: termux-aarch64
          path: tg-termux-aarch64.tar.gz
