name: Build Binaries

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

concurrency:
  group: build-binaries-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }} binaries
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: Linux
            artifact_name: tg-linux-x86_64.tar.gz
            artifact_dir: out/linux
            archive_path: out/tg-linux-x86_64.tar.gz
            executable_server: dist/tg-server
            executable_cli: dist/tg-cli
            shell: bash
          - os: windows-latest
            label: Windows
            artifact_name: tg-windows-x64.zip
            artifact_dir: out/windows
            archive_path: out/tg-windows-x64.zip
            executable_server: dist/tg-server.exe
            executable_cli: dist/tg-cli.exe
            shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            build/requirements-build.txt

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r build/requirements-build.txt

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r build/requirements-build.txt

      - name: Verify repository layout (Linux)
        if: runner.os == 'Linux'
        run: |
          test -f server_main.py
          test -f cli_main.py
          test -f build/tg-server.spec
          test -f build/tg-cli.spec
          test -f build/build-local.sh
          test -f build/requirements-build.txt

      - name: Verify repository layout (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (!(Test-Path 'server_main.py')) { throw 'server_main.py not found' }
          if (!(Test-Path 'cli_main.py')) { throw 'cli_main.py not found' }
          if (!(Test-Path 'build/tg-server.spec')) { throw 'build/tg-server.spec not found' }
          if (!(Test-Path 'build/tg-cli.spec')) { throw 'build/tg-cli.spec not found' }
          if (!(Test-Path 'build/build-local.ps1')) { throw 'build/build-local.ps1 not found' }
          if (!(Test-Path 'build/requirements-build.txt')) { throw 'build/requirements-build.txt not found' }

      - name: Clean transient files (Linux)
        if: runner.os == 'Linux'
        run: |
          rm -rf build-cache dist out
          find . -type d -name '__pycache__' -prune -exec rm -rf {} +

      - name: Clean transient files (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Remove-Item build-cache, dist, out -Recurse -Force -ErrorAction SilentlyContinue
          Get-ChildItem -Path . -Filter __pycache__ -Recurse -Directory | Remove-Item -Recurse -Force -ErrorAction SilentlyContinue

      - name: Build binaries (Linux)
        if: runner.os == 'Linux'
        run: |
          python -m PyInstaller --clean --workpath build-cache/server --distpath dist build/tg-server.spec
          python -m PyInstaller --clean --workpath build-cache/cli --distpath dist build/tg-cli.spec
          test -f '${{ matrix.executable_server }}'
          test -f '${{ matrix.executable_cli }}'

      - name: Build binaries (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python -m PyInstaller --clean --workpath build-cache/server --distpath dist build/tg-server.spec
          python -m PyInstaller --clean --workpath build-cache/cli --distpath dist build/tg-cli.spec
          if (!(Test-Path '${{ matrix.executable_server }}')) { throw '${{ matrix.executable_server }} not found' }
          if (!(Test-Path '${{ matrix.executable_cli }}')) { throw '${{ matrix.executable_cli }} not found' }

      - name: Package artifacts (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p '${{ matrix.artifact_dir }}'
          cp '${{ matrix.executable_server }}' '${{ matrix.artifact_dir }}/'
          cp '${{ matrix.executable_cli }}' '${{ matrix.artifact_dir }}/'
          cp README.md '${{ matrix.artifact_dir }}/'
          if [ -f docs.md ]; then cp docs.md '${{ matrix.artifact_dir }}/'; fi
          chmod +x '${{ matrix.artifact_dir }}/tg-server' '${{ matrix.artifact_dir }}/tg-cli'
          tar -C '${{ matrix.artifact_dir }}' -czf '${{ matrix.archive_path }}' .

      - name: Package artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path '${{ matrix.artifact_dir }}' | Out-Null
          Copy-Item '${{ matrix.executable_server }}' '${{ matrix.artifact_dir }}/'
          Copy-Item '${{ matrix.executable_cli }}' '${{ matrix.artifact_dir }}/'
          Copy-Item README.md '${{ matrix.artifact_dir }}/'
          if (Test-Path 'docs.md') { Copy-Item docs.md '${{ matrix.artifact_dir }}/' }
          Compress-Archive -Path '${{ matrix.artifact_dir }}/*' -DestinationPath '${{ matrix.archive_path }}' -Force

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ runner.os == 'Linux' && 'linux-binaries' || 'windows-binaries' }}
          path: ${{ matrix.archive_path }}
          if-no-files-found: error
          compression-level: 0

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: List collected files
        run: find release-artifacts -type f | sort

      - name: Create release if missing
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists."
          else
            gh release create "$TAG" --title "$TAG" --generate-notes
          fi

      - name: Upload release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          find release-artifacts -type f \( -name '*.zip' -o -name '*.tar.gz' \) -print0 | while IFS= read -r -d '' file; do
            echo "Uploading $file"
            gh release upload "$TAG" "$file" --clobber
          done
